name: lunasea
description: Self-Hosted Controller
version: 11.0.0+1
publish_to: "none"
environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.41.0"
dependencies:
  flutter:
    sdk: flutter
  app_links: ^7.0.0
  badges: ^3.2.0
  cached_network_image: ^3.4.1
  collection: ^1.18.0
  convert: ^3.1.1
  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  dio: ^5.9.2
  easy_localization: ^3.0.8
  encrypt: ^5.0.1
  expandable: ^5.0.1
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flash: ^3.0.5+1
  flutter_cache_manager: ^3.3.1
  flutter_spinkit: ^5.2.2
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  google_nav_bar: ^5.0.6
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  infinite_scroll_pagination: ^5.1.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  modal_bottom_sheet: ^3.0.0-pre
  package_info_plus: ^9.0.1
  path_provider: ^2.1.0
  percent_indicator: ^4.2.5
  quick_actions: ^1.0.5
  retrofit: ^4.9.2
  share_plus: ^12.0.2
  shimmer: ^3.0.0
  simple_icons: ^14.6.1
  stack_trace: ^1.11.0
  stash_memory: ^5.2.0
  supercharged: ^2.1.1
  table_calendar: ^3.0.9
  transparent_image: ^2.0.1
  tuple: ^2.0.2
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  wake_on_lan: ^4.1.0
  window_manager: ^0.5.1
  xml: ^6.6.1
dev_dependencies:
  # Generators
  build_runner: ^2.4.6
  environment_config: ^4.0.0+1
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.11.1
  retrofit_generator: ^10.2.6
  # Tooling
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.2
  msix: ^3.16.1
dependency_overrides:
  http: ^1.6.0
flutter:
  uses-material-design: true
  assets:
    # System Assets
    - assets/images/
    - assets/localization/
  fonts:
    - family: LunaBrandIcons
      fonts:
        - asset: assets/LunaBrandIcons.ttf
flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#32323E"
  adaptive_icon_foreground: assets/icon/icon_adaptive.png
flutter_native_splash:
  image: assets/images/branding_full.png
  color: "#32323E"
msix_config:
  architecture: x64
  capabilities: internetClientServer,privateNetworkClientServer
  display_name: LunaSea
  enable_at_startup: false
  execution_alias: lunasea
  identity_name: app.lunasea.lunasea
  install_certificate: false
  logo_path: assets\icon\icon_windows.png
  output_name: lunasea-windows-amd64
  store: false
