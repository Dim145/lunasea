server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter Wasm requires a cross-origin isolated context so it can use
    # SharedArrayBuffer for multithreading. Browsers honour these headers as a
    # hint; the Flutter web loader falls back to JS automatically when the
    # isolation requirement isn't met.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # SPA routing — let Flutter's hash-less router resolve unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # `application/wasm` is shipped in `mime.types` since nginx 1.21.5, but
    # keep this explicit override so older bases keep working.
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    # ES modules: Flutter ships `main.dart.mjs` as the wasm bootstrap. nginx's
    # default mime.types does not recognise `.mjs`, so it falls back to
    # `application/octet-stream` and the browser refuses to evaluate the
    # module. Force the JavaScript MIME type.
    location ~ \.mjs$ {
        default_type text/javascript;
    }
}
