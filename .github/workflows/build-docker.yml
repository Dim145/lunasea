name: Build & push Docker images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to tag the images with (e.g. 1.2.3). Leave blank to tag with the short commit SHA only.'
        required: false
        type: string
      tag_latest:
        description: 'Also push the `latest` tag (skip for prereleases or test builds).'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for uploading SARIF (Trivy scan results) to the Security tab.
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: lunasea-web
            context: lunasea
          - name: lunasea-notification-service
            context: lunasea-notification-service
          - name: lunasea-docs
            context: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ghcr.io requires the image path to be lowercase; GITHUB_REPOSITORY
      # is owner/repo as configured on GitHub (preserves case). Lower-case
      # it with Bash parameter expansion as the user explicitly asked.
      - name: Compute image reference
        id: ref
        run: |
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ matrix.image.name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ref.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}

      # Build once for the local Docker daemon so we can scan before push.
      # The multi-arch push happens in a separate step that reuses the
      # buildx cache (so this is not a double build).
      - name: Build (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          load: true
          tags: ${{ steps.ref.outputs.image }}:scan
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Trivy vulnerability scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}:scan
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          # Do not fail the build on findings — surface them in the Security
          # tab instead. Flip `exit-code: '1'` here once the baseline is clean.
          exit-code: '0'

      - name: Upload Trivy SARIF to Security tab
        if: always() && steps.trivy.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ref.outputs.image }}:scan
          format: spdx-json
          output-file: sbom-${{ matrix.image.name }}.spdx.json

      - name: Attach SBOM to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
